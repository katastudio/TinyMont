name: Deploy Web (GitHub Pages)

# Exporta TinyMont a HTML5 y lo publica en GitHub Pages.
# La imagen de CI trae Godot + templates 'web' (con hilos), pero NO la variante
# 'web_nothreads' que usamos (para andar en Pages sin headers COOP/COEP), asi que
# la instalamos aparte. Requiere (una sola vez): Settings > Pages > Source = "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Un solo deploy a la vez
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  export-and-deploy:
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.4.1
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar template web_nothreads (falta en la imagen de CI)
        run: |
          set -e
          VER=4.4.1-stable
          DEST="$HOME/.local/share/godot/export_templates/4.4.1.stable"
          mkdir -p "$DEST"
          curl -sSL -o /tmp/templates.tpz \
            "https://github.com/godotengine/godot/releases/download/${VER}/Godot_v${VER}_export_templates.tpz"
          unzip -o -q /tmp/templates.tpz "templates/web_nothreads_*" -d /tmp/tpz
          cp -f /tmp/tpz/templates/web_nothreads_*.zip "$DEST"/
          echo "Templates web instalados:"; ls -1 "$DEST" | grep web

      - name: Exportar build Web
        run: |
          mkdir -p builds/web
          godot --headless --verbose --export-release "Web" builds/web/index.html
          test -f builds/web/index.html

      - name: Configurar Pages
        uses: actions/configure-pages@v5

      - name: Subir artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: builds/web

      - name: Deploy a GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
